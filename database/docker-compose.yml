services:
  postgres:
    image: postgres:16-alpine
    container_name: support-ticket-postgres
    restart: unless-stopped
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: ticket_user
      POSTGRES_PASSWORD: changeme
      POSTGRES_DB: support_tickets
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ticket_user -d support_tickets"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
